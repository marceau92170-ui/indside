<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inside – Choix de couleurs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
    gap: 48px;
  }
  .top-label {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: center;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 720px;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .card-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .04em;
    color: rgba(255,255,255,0.75);
    text-align: center;
  }
  .phone {
    width: 180px;
    height: 360px;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 0;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .top-nav {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 5px;
  }
  .nav-btn {
    width: 28px;
    height: 28px;
    border-radius: 9px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-box {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 900;
    color: white;
  }
  .app-title {
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .app-sub {
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(240,240,245,0.50);
    margin-top: 4px;
  }
  .nox {
    font-size: 2rem;
    margin-top: 2px;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 0.9rem;
    color: #fff;
    text-align: center;
    margin-bottom: 8px;
  }
  .btn-secondary {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 0.85rem;
    color: rgba(240,240,245,0.80);
    text-align: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .glow {
    position: absolute;
    border-radius: 9999px;
    filter: blur(40px);
    pointer-events: none;
  }
</style>
</head>
<body>

<p class="top-label">Choisis ta palette de couleurs</p>

<div class="grid">

  <!-- 1. Coucher de soleil -->
  <div class="card">
    <div class="card-label">🌅 Coucher de soleil</div>
    <div class="phone" style="background: #0a0808;">
      <div class="glow" style="width:220px;height:220px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,107,53,0.22) 0%, transparent 70%);"></div>
      <div class="glow" style="width:200px;height:200px;bottom:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(230,57,70,0.16) 0%, transparent 70%);"></div>
      <div class="top-nav">
        <div class="nav-btn">⚙️</div>
        <div class="nav-btn">👤</div>
      </div>
      <div class="hero">
        <div class="logo-box" style="background:linear-gradient(135deg,#FF6B35,#E63946);box-shadow:0 12px 30px rgba(255,107,53,0.45);">I</div>
        <div>
          <div class="app-title" style="background-image:linear-gradient(135deg,#FF6B35,#F7C59F,#E63946);">Inside</div>
          <div class="app-sub">Entre amis.</div>
        </div>
        <div class="nox">🐺</div>
      </div>
      <div class="btn-primary" style="background:linear-gradient(135deg,#FF6B35,#E63946);box-shadow:0 8px 24px rgba(255,107,53,0.40);">Créer</div>
      <div class="btn-secondary">Rejoindre</div>
    </div>
  </div>

  <!-- 2. Ocean tropical -->
  <div class="card">
    <div class="card-label">🌊 Océan tropical</div>
    <div class="phone" style="background: #06090f;">
      <div class="glow" style="width:220px;height:220px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(0,201,255,0.20) 0%, transparent 70%);"></div>
      <div class="glow" style="width:200px;height:200px;bottom:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(0,119,182,0.18) 0%, transparent 70%);"></div>
      <div class="top-nav">
        <div class="nav-btn">⚙️</div>
        <div class="nav-btn">👤</div>
      </div>
      <div class="hero">
        <div class="logo-box" style="background:linear-gradient(135deg,#00C9FF,#0077B6);box-shadow:0 12px 30px rgba(0,201,255,0.40);">I</div>
        <div>
          <div class="app-title" style="background-image:linear-gradient(135deg,#00C9FF,#00E5B0,#0077B6);">Inside</div>
          <div class="app-sub">Entre amis.</div>
        </div>
        <div class="nox">🐺</div>
      </div>
      <div class="btn-primary" style="background:linear-gradient(135deg,#00C9FF,#00E5B0);box-shadow:0 8px 24px rgba(0,201,255,0.38);">Créer</div>
      <div class="btn-secondary">Rejoindre</div>
    </div>
  </div>

  <!-- 3. Citrus -->
  <div class="card">
    <div class="card-label">🍋 Citrus</div>
    <div class="phone" style="background: #0a0900;">
      <div class="glow" style="width:220px;height:220px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,214,10,0.20) 0%, transparent 70%);"></div>
      <div class="glow" style="width:200px;height:200px;bottom:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,67,101,0.16) 0%, transparent 70%);"></div>
      <div class="top-nav">
        <div class="nav-btn">⚙️</div>
        <div class="nav-btn">👤</div>
      </div>
      <div class="hero">
        <div class="logo-box" style="background:linear-gradient(135deg,#FFD60A,#FF9F1C);box-shadow:0 12px 30px rgba(255,214,10,0.40);">I</div>
        <div>
          <div class="app-title" style="background-image:linear-gradient(135deg,#FFD60A,#FF9F1C,#FF4365);">Inside</div>
          <div class="app-sub">Entre amis.</div>
        </div>
        <div class="nox">🐺</div>
      </div>
      <div class="btn-primary" style="background:linear-gradient(135deg,#FFD60A,#FF9F1C,#FF4365);box-shadow:0 8px 24px rgba(255,159,28,0.40);">Créer</div>
      <div class="btn-secondary">Rejoindre</div>
    </div>
  </div>

  <!-- 4. Tropical nuit -->
  <div class="card">
    <div class="card-label">🌺 Tropical nuit</div>
    <div class="phone" style="background: #09060a;">
      <div class="glow" style="width:220px;height:220px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,0,110,0.22) 0%, transparent 70%);"></div>
      <div class="glow" style="width:200px;height:200px;bottom:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,190,11,0.16) 0%, transparent 70%);"></div>
      <div class="top-nav">
        <div class="nav-btn">⚙️</div>
        <div class="nav-btn">👤</div>
      </div>
      <div class="hero">
        <div class="logo-box" style="background:linear-gradient(135deg,#FF006E,#FB5607);box-shadow:0 12px 30px rgba(255,0,110,0.45);">I</div>
        <div>
          <div class="app-title" style="background-image:linear-gradient(135deg,#FF006E,#FB5607,#FFBE0B);">Inside</div>
          <div class="app-sub">Entre amis.</div>
        </div>
        <div class="nox">🐺</div>
      </div>
      <div class="btn-primary" style="background:linear-gradient(135deg,#FF006E,#FB5607,#FFBE0B);box-shadow:0 8px 24px rgba(255,0,110,0.40);">Créer</div>
      <div class="btn-secondary">Rejoindre</div>
    </div>
  </div>

</div>

</body>
</html>
